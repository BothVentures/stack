<body><div class=&quot;doc&quot;><h1 id=&quot;photonic-labs-wiki-del-proyecto&quot;>Photonic Labs — Wiki del Proyecto</h1>
<blockquote>
<p><strong>Qué es este documento.</strong> La referencia navegable y única del proyecto Photonic Labs. Consolida los catorce documentos de la fase de pre-incubación (SOW Qualia+ · Both Ventures, febrero–julio 2026) y los <strong>sincroniza contra las decisiones vigentes de julio 2026</strong>. Donde la pre-incubación y las últimas iteraciones difieren, <strong>prevalece la definición más reciente</strong> — y la diferencia queda registrada explícitamente en <a href=&quot;#12-sincronizacion-y-discrepancias&quot;>§12 Sincronización y discrepancias</a>.</p>
<p><strong>Anclas de verdad (2026-07-07):</strong> <span class=&quot;ref&quot; title=&quot;2026-07-07-photonic-caminos-a-aplus-b.md&quot;><code>photonic-caminos-a-aplus-b</code></span> · <span class=&quot;ref&quot; title=&quot;2026-07-07-photonic-labs-one-pager.html&quot;><code>photonic-labs-one-pager</code></span> · venture file <span class=&quot;ref&quot; title=&quot;../../../ventures/photonic-lab.md&quot;><code>photonic-lab.md</code></span>.</p>
<p><strong>Documento hermano:</strong> <a href=&quot;javascript:void(0)&quot; class=&quot;xref&quot; onclick=&quot;parent.__go('biblia')&quot;>Biblia del Proyecto</a> — toda la data dura. Este wiki explica y enmarca; la biblia lista y respalda.</p>
</blockquote>

<hr />
<h2 id=&quot;1-que-es-photonic-labs&quot;>1 · Qué es Photonic Labs</h2>
<p><strong>Photonic Labs es la capa de infraestructura de escalado biotech que hoy no existe en LATAM</strong> — un wet-lab multiplataforma, GMP-ready desde el diseño, que lleva la investigación validada del banco (TRL 4–5) al lote piloto validado y transferible (TRL 7–8), en suelo uruguayo y a precios que el pipeline regional puede pagar.</p>
<ul>
<li><strong>Owner / champion:</strong> René Labarthe (narrativa, posicionamiento, coherencia). Gate de capital y estructura: Gastón Frydlewski.</li>
<li><strong>Base:</strong> Uruguay — sitio objetivo: <strong>Parque de las Ciencias, Canelones</strong>.</li>
<li><strong>Rol de BOTH:</strong> Explore + Hands-on. Etapa: <strong>cierre de pre-incubación → incubación</strong> (2026-07-07).</li>
<li><strong>Advisors estratégicos:</strong> <strong>Qualia+</strong> (Alejandro San Juan + Juan Eduardo &quot;JEC&quot; Ceriani) — acceso al ecosistema médico-científico + profundidad operativa GMP que BOTH no tiene por linaje propio.</li>
</ul>
<blockquote>
<p><strong>Encuadre canónico (decisión 2026-07-02):</strong> el scope de fundación es un <strong>wet-lab stand-alone</strong> que tiene que funcionar como negocio independiente. Silicio / IA / cómputo / &quot;quantum&quot; <strong>no</strong> son el core inicial — son <em>boosters</em> que se agregan sobre una base que se sostiene sola. Ver <a href=&quot;#3-los-tres-caminos-a-a-b&quot;>§3</a> y <a href=&quot;#12-sincronizacion-y-discrepancias&quot;>§12</a>.</p>
</blockquote>
<hr />
<h2 id=&quot;2-la-tesis-el-gap-de-trl-58&quot;>2 · La tesis: el gap de TRL 5–8</h2>
<p>LATAM biotech no falla por ciencia débil. Falla porque <strong>no existe la infraestructura para escalar esa ciencia</strong>. El hueco está en el rango <strong>TRL 5–8</strong>: investigación validada que necesita volverse producción piloto, lotes GMP y procesos documentados y transferibles a un CDMO.</p>
<table>
<thead>
<tr>
<th>Rango TRL</th>
<th>Etapa</th>
<th>Estado en Uruguay / región</th>
</tr>
</thead>
<tbody>
<tr>
<td>TRL 1–4</td>
<td>Investigación básica + prueba de concepto</td>
<td><strong>Cubierto</strong> (UdelaR, Pasteur, INIA, ORT)</td>
</tr>
<tr>
<td>TRL 5–6</td>
<td>Escalado + piloto</td>
<td><strong>GAP CRÍTICO</strong> — casi cero opciones</td>
</tr>
<tr>
<td>TRL 7–8</td>
<td>Producción GMP + transferencia</td>
<td><strong>GAP CRÍTICO</strong> — mAbxience (AR) inaccesible para etapa temprana</td>
</tr>
<tr>
<td>TRL 9</td>
<td>Manufactura comercial</td>
<td><strong>Inaccesible</strong> — volúmenes mínimos excluyen startups</td>
</tr>
</tbody>
</table>
<p><strong>Evidencia dura (ver <a href=&quot;javascript:void(0)&quot; class=&quot;xref&quot; onclick=&quot;parent.__go('biblia')&quot;>Biblia §1–2</a>):</strong>
- <strong>0</strong> hubs de scale-up GMP accesibles para startups en LATAM.
- <strong>62</strong> empresas biotech activas en Uruguay (censo Stubrin, Oct 2025); solo <strong>11 de 44</strong> relevadas tienen planta propia; solo <strong>3</strong> con certificación internacional.
- <strong>57%</strong> de las startups no tiene laboratorio propio.
- Encuesta regional (74 startups): <strong>59%</strong> apunta a GMP, <strong>34%</strong> necesita infraestructura de escalado, <strong>39%</strong> busca socios industriales para escalar.
- Techo de precio verificado: <strong>USD 50.000 / 100 g</strong> (Ardan Pharma terceriza en un CRO de India). Photonic cotiza por debajo.</p>
<p><strong>Matiz importante — el &quot;riesgo commodity&quot; (aclaración René, 07-07):</strong> el gap es real y hoy está desatendido — <em>eso</em> explica por qué hay demanda. Pero &quot;desatendido hoy&quot; ≠ &quot;defendible mañana&quot;. Un wet-lab que vende capacidad fee-for-service es <strong>replicable</strong> (ATGen extendiendo su downstream, o un entrante con capital). Ser first-mover sobre un hueco vacío es <strong>una ventana, no un foso</strong>. Lo que vuelve el negocio defendible es la capa propietaria de A+ + el embedding institucional (ZF, ANII, nodo BID Lab). El argumento commodity, por lo tanto, es un argumento <strong>a favor de A+ sobre A puro</strong>, no en contra de la tesis.</p>
<hr />
<h2 id=&quot;3-los-tres-caminos-a-a-b&quot;>3 · Los tres caminos — A / A+ / B</h2>
<blockquote>
<p><strong>La pregunta es de tesis, no de modelo financiero.</strong> Antes de definir <em>cuánto se levanta</em>, hay que cerrar <em>qué ES</em> Photonic. (Decisión 2026-07-07 · gate Gastón.)</p>
</blockquote>
<p><strong>La dirección &quot;landmark / edificio-statement&quot; (tipo Bodega Garzón) quedó DESCARTADA por completo</strong> (René, 07-07): capex-heavy, la peor sustentada, compite con el capital desplegable, y ningún comparable relevante — ni SOSV — construyó un landmark. Es statement, no plan. Quedan tres caminos vivos:</p>
<table>
<thead>
<tr>
<th></th>
<th><strong>Camino A</strong> — Wet-lab lean</th>
<th><strong>Camino A+</strong> — Wet-lab + cómputo</th>
<th><strong>Camino B</strong> — Lab + fondo</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Qué es</strong></td>
<td>Servicios de escalado TRL 5–8. Modelo 3. Sin capa de cómputo.</td>
<td>La base A + capa in-silico / digital-twin / custodia de IP como <strong>booster</strong>.</td>
<td>Flywheel lab + sleeve de inversión (modelo SOSV/IndieBio): invertir + alojar + componer.</td>
</tr>
<tr>
<td><strong>Lente</strong></td>
<td>Piso de caja. Runway, break-even, márgenes.</td>
<td>Caja + <strong>foso</strong> (diferenciación defendible).</td>
<td>Patrimonial. Retorno en el equity del portfolio, no en la caja del lab.</td>
</tr>
<tr>
<td><strong>Capex / ronda</strong></td>
<td>$1.48M capex · ronda <strong>$1.9M</strong> (NoZF) / $2.05M (ZF)</td>
<td>~$1.5M capex · ronda <strong>~$2M</strong> (sin salto de ticket)</td>
<td>Vehículo <strong>$15–20M</strong> (GMP) o facility lean dentro de $10M <em>(estimado)</em></td>
</tr>
<tr>
<td><strong>Retorno</strong></td>
<td>EBITDA+ Y2 (NoZF) · neto 6a ~$3.33M (→~$4.0M dual-entity)</td>
<td>Capa ~85% margen · ~16% del revenue a madurez — <strong>sostiene el EBITDA Y2</strong></td>
<td>Equity del sleeve + la infra hace valer más ese equity. Dos J-curves apiladas.</td>
</tr>
<tr>
<td><strong>Quién fondea</strong></td>
<td>ANII (70% no-reemb.) + Impact VC + BOTH. <strong>Alcanzable hoy.</strong></td>
<td>Igual que A. <strong>Alcanzable hoy.</strong></td>
<td>Funder soberano/estratégico + LPs. <strong>Hoy no comprometido.</strong></td>
</tr>
<tr>
<td><strong>Riesgo primario</strong></td>
<td><strong>Commodity</strong> — fee-for-service replicable</td>
<td>Ejecución de la capa (el break-even depende de ella)</td>
<td>Revenue circular ≠ validación · conflicto de interés · funder no aparece · overlap <strong>Panambi</strong></td>
</tr>
<tr>
<td><strong>Estado</strong></td>
<td>Piso de caja</td>
<td><strong>Caso base — piso realista</strong></td>
<td>Ambición separada · gate Gastón</td>
</tr>
</tbody>
</table>
<p><strong>El hallazgo del break-even (modelo v3):</strong> <em>sin</em> la capa computacional, el EBITDA Y2 NoZF pasa de <strong>+$96k a ≈ −$57k</strong> y el break-even se corre de Y2 a Y3. La línea que la decisión 07-02 mandó a sacar del core es, en la aritmética actual, la que sostiene la rentabilidad temprana. <strong>Por eso A+ —no A puro— es el piso realista:</strong> misma ronda (~$2M), mismo perfil de inversor, con el layer adentro como booster.</p>
<p><strong>Camino B es un fondo, no un lab más grande.</strong> No es &quot;A+ con más plata&quot;: es un vehículo de inversión — LP distinto, skill distinto, gobernanza distinta, posiblemente dos rondas. Antes de modelarlo (v3.1) hace falta (1) un <strong>funder soberano/estratégico concreto y comprometido</strong>, (2) estructurar el <strong>conflicto de interés</strong> (el lab que aloja invierte en sus residentes) y (3) reconciliar el <strong>overlap con Panambi</strong> (salud mental — Eywa cae ahí). Gate exclusivo de Gastón (nuevo vehículo de capital).</p>
<p><strong>Lo que NO está sobre la mesa:</strong> el peldaño intermedio Tier-1 AAA a $4.5–5.5M. Canon de Daiana — <strong>&quot;lean o full, no el medio&quot;</strong>.</p>
<p><strong>El eje Zona Franca es ORTOGONAL:</strong> aplica igual a los tres caminos y se decide en paralelo. No cambia cuál elegís. Ver <a href=&quot;#7-marco-legal-fiscal-y-zona-franca&quot;>§7</a>.</p>
<hr />
<h2 id=&quot;4-el-modelo-operativo-modelo-3&quot;>4 · El modelo operativo — Modelo 3</h2>
<p><strong>Decisión 2026-07-02 (Type-3):</strong> el modelo operativo de Photonic Lab es el <strong>Modelo 3 — I+D + GMP-Ready</strong>.</p>
<p>De los 8 modelos de infraestructura evaluados (0 a 7, más 5B — ver <a href=&quot;javascript:void(0)&quot; class=&quot;xref&quot; onclick=&quot;parent.__go('biblia')&quot;>Biblia §4</a>), el Modelo 3 es el punto de entrada más defendible dado el estado del pipeline regional.</p>
<p><strong>La lógica:</strong> infraestructura de <strong>transición evolutiva</strong>. Es un laboratorio de desarrollo pero con <strong>sobre-inversión estratégica</strong> en layout, flujos de personas y materiales, superficies, drenajes, terminaciones y documentación, para ser <strong>compatible con estándares GMP sin la certificación plena</strong>. Se paga el &quot;diseño para futuro GMP&quot; hoy para <strong>no reconstruir mañana</strong>. Cuando la demanda lo justifique, el salto a GMP certificado es una <strong>evolución, no una reconstrucción</strong>.</p>
<ul>
<li>Ancla los <strong>primeros 2–3 clientes</strong> en TRL 5–8 sin requerir certificación GMP full en el arranque.</li>
<li>Hard capex ~<strong>USD 1.48M</strong>.</li>
<li>Escalas Tramo 1: <strong>10–50 litros</strong>.</li>
<li>Evoluciona a Modelo 5 (Híbrido, GMP full) hacia el <strong>año 3–4</strong>.</li>
</ul>
<blockquote>
<p>⚠️ <strong>Nota de sincronización:</strong> la decisión 07-02 quedó auto-minada con &quot;target: 2M litros bioreactores mínimo&quot; — es un <strong>artefacto de transcripción</strong>. La escala real es <strong>10–50 L (Tramo 1) → 200–300 L (Tramo 2)</strong>, consistente con Capabilities, CAPEX y one-pager. Ver <a href=&quot;#12-sincronizacion-y-discrepancias&quot;>§12</a>.</p>
</blockquote>
<p><strong>Diferenciadores del modelo (verificados en pre-incubación):</strong>
1. <strong>Single-use como formato principal</strong> — elimina contaminación cruzada entre clientes, anula CIP/SIP, reduce el turnaround de días a horas. Arquitectura de controlador dual (vidrio + SU). Validado con Eleonora Scoseria.
2. <strong>Downstream dimensionado proporcionalmente al upstream</strong> (ÄKTA Process + ÄKTA Pilot + TFF) — el diferenciador crítico frente a ATGen, que tiene un biorreactor de 300 L con downstream dimensionado para 30 L.
3. <strong>GMP-ready desde el diseño</strong> — flujos unidireccionales, QA/QC integrado, batch records, trazabilidad LIMS → dossier transferible a CDMO.
4. <strong>Plataforma multiplataforma</strong> — cubre ~70% del pipeline biotech regional (procariotas, levaduras, mamífero, insecto, hongos filamentosos, microalgas) sin retooling sustancial.</p>

<h3 id=&quot;el-eje-zona-franca-ortogonal-y-reabierto&quot;>El eje Zona Franca — ortogonal y reabierto</h3>
<p><strong>La estructura ZF es un eje ORTOGONAL a los caminos A/A+/B:</strong> aplica igual a los tres y se decide en paralelo (Fase A). Solo cambia los parámetros fiscales, no la secuencia ni cuál camino elegís.</p>
<p>Dos configuraciones sobre la mesa:
- <strong>All-in-ZF desde el día uno</strong> — IRAE/IP/IVA 0%, importación exonerada, optimizado para export regional. Ratificado por Gastón el <strong>2026-06-23</strong> (Type-1).
- <strong>Outside-first → dual-entity Yr 3–4</strong> — arrancar fuera de ZF (acceso pleno ANII + Ley de Inversiones), activar entidad ZF cuando el export supere ~60% del revenue. <strong>Reabierto</strong> el 2026-07-04 por el caso v3 (+$160K grants · EBITDA+ Y2 vs Y3 · break-even ~1 año antes · neto acum ~$3.33M NoZF → ~$4.0M dual vs ~$3.8M all-in-ZF).</p>
<p><strong>Estado actual (canónico):</strong> la decisión ZF está <strong>reabierta</strong> (<code>zf-reopened</code>) — es gate de Gastón, diferida ~10 días a partir del 07-07. <strong>Un solo lab físico</strong> en cualquier caso; la entidad ZF es una capa legal que se agrega, no un segundo laboratorio.</p>
<p><strong>Puntos finos confirmados (Cristina Montero, Uruguay XXI):</strong>
- ANII en ZF <strong>sí</strong> disponible desde 2025 — instrumento <strong>Implementación de la Innovación</strong>: 70% no-reembolsable, tope UYU 4M (5M con impacto climático). ANII financia honorarios, consultorías, software, IP — <strong>no</strong> equipamiento/activos fijos.
- Clientes uruguayos habilitados <strong>pero no pueden ser mayoría de la cartera</strong> (mercado principal debe ser regional/internacional).
- El gasto que un cliente uruguayo pague desde ZF <strong>no le es deducible de IRAE</strong> (desventaja de precio frente a labs fuera de ZF) — pendiente confirmación del tributarista sobre Ley 19.566 (Andres facilita).
- <strong>COMAP no aplica en ZF</strong> — los beneficios de ZF sustituyen a los de COMAP. Fuera de ZF, la vía es COMAP + Ley 16.462.</p>

<h3 id=&quot;tecnicos-bioproceso&quot;>Técnicos (bioproceso)</h3>
<ul>
<li><strong>TRL (Technology Readiness Level)</strong> — 1–9. El gap objetivo es TRL 5–8.</li>
<li><strong>Wet-lab</strong> — laboratorio físico de bioprocesos (vs. capa in-silico/computacional).</li>
<li><strong>Upstream</strong> — fase de producción: banco celular → inóculo → fermentación/cultivo.</li>
<li><strong>Downstream</strong> — purificación post-fermentación: clarificación → captura → pulido → ultrafiltración/diafiltración.</li>
<li><strong>Single-use (SU)</strong> — consumibles descartables (bolsas, tubings, filtros). Elimina contaminación cruzada y CIP/SIP.</li>
<li><strong>CIP / SIP</strong> — Clean-In-Place / Steam-In-Place: protocolos de limpieza/esterilización que el single-use elimina.</li>
<li><strong>GMP (Good Manufacturing Practices)</strong> — buenas prácticas de manufactura farmacéutica.</li>
<li><strong>GMP-Ready</strong> — diseñado para cumplir GMP (flujos, superficies, docs) sin la certificación plena; el salto a GMP certificado es evolución, no reconstrucción.</li>
<li><strong>MCB / WCB</strong> — Master Cell Bank / Working Cell Bank: los bancos de células/cepas de cada cliente. El activo biológico más valioso.</li>
<li><strong>ÄKTA (Process / Pilot / Ready)</strong> — sistemas de cromatografía de Cytiva; el estándar GMP del downstream.</li>
<li><strong>TFF / UF-DF</strong> — Tangential Flow Filtration / Ultrafiltración-Diafiltración: concentración y cambio de buffer.</li>
<li><strong>STR</strong> — Stirred-Tank Reactor: biorreactor de agitación mecánica (el estándar).</li>
<li><strong>Biorreactor single-use</strong> — p.ej. Eppendorf BioFlo 320 + BioBLU (10L/50L).</li>
<li><strong>HVAC</strong> — climatización + filtración (HEPA) para salas limpias.</li>
<li><strong>ISO 7 / ISO 8</strong> — clases de sala limpia (partículas). El corredor de producción opera ISO 8.</li>
<li><strong>CNC</strong> — Clasificación No Controlada (zonas sin clasificación de sala limpia).</li>
<li><strong>BSL-1 / BSL-2</strong> — niveles de bioseguridad. E. coli K-12 es BSL-1; el lab opera BSL-2 flexible.</li>
<li><strong>LIMS / ELN</strong> — Laboratory Information Management System / Electronic Lab Notebook (Benchling). Trazabilidad + batch records.</li>
<li><strong>IQ / OQ</strong> — Installation / Operational Qualification: calificación de equipos e instalaciones (commissioning).</li>
<li><strong>CDMO / CMO / CRO</strong> — Contract Development &amp;amp; Manufacturing / Manufacturing / Research Organization.</li>
<li><strong>QA / QC</strong> — Quality Assurance / Quality Control.</li>
<li><strong>Digital twin</strong> — modelo computacional del biorreactor + downstream (servicio C1).</li>
<li><strong>In-silico design</strong> — diseño/ranking molecular computacional (servicio C2).</li>
<li><strong>IP custody</strong> — custodia criptográfica (post-quantum-ready) de MCB/WCB (servicio C3).</li>
</ul>
<h3 id=&quot;fiscal-legal&quot;>Fiscal / legal</h3>
<ul>
<li><strong>Zona Franca (ZF)</strong> — régimen de exoneración fiscal (Ley 15.921). IRAE/IP/IVA 0%.</li>
<li><strong>COMAP</strong> — Comisión de Aplicación (Ley 16.906). Vía de exoneración fuera de ZF. <strong>No aplica en ZF.</strong></li>
<li><strong>IRAE</strong> — Impuesto a las Rentas de las Actividades Económicas (25% estándar; 0% en ZF).</li>
<li><strong>IP</strong> — Impuesto al Patrimonio.</li>
<li><strong>IVA</strong> — Impuesto al Valor Agregado.</li>
<li><strong>Decreto 329/025</strong> — reglamentación de la Ley 16.906 vigente desde 01-02-2026; mejora acceso de mypes.</li>
<li><strong>Implementación de la Innovación</strong> — instrumento ANII: 70% no-reembolsable, tope UYU 4M (5M con impacto climático). Financia honorarios/consultorías/software/IP, <strong>no</strong> equipamiento.</li>
<li><strong>Fondo Orestes Fiandra</strong> — instrumento ANII de crédito (no subsidio).</li>
<li><strong>MERCOSUR arancel 0%</strong> — importación de equipamiento desde Argentina/Brasil sin arancel.</li>
<li><strong>Golden Ticket</strong> — mecanismo (tipo LabCentral) donde un sponsor paga la residencia de una startup → demanda no-dilutiva. Mapeable a ANII/soberano.</li>
</ul>
<h3 id=&quot;estructura-del-modelo-comercial-decision-e&quot;>Estructura del modelo comercial (Decisión E)</h3>
<ul>
<li><strong>E1</strong> — capital-por-LOI selectivo con 1–2 anchors para destrabar el cornerstone.</li>
<li><strong>E2</strong> — sleeve de inversión $1–2M en biotech regional temprana, en vehículo separado. Es la esencia del Camino B.</li>
<li><strong>Cornerstone</strong> — inversor ancla de la ronda (USD 2–3M).</li>
<li><strong>Flywheel</strong> — el loop lab+fondo: la infra de-riska la inversión y el equity hace valer más la infra.</li>
</ul>

<h2 id=&quot;4-diseno-de-planta-21-zonas&quot;>4 · Diseño de planta — 21 zonas</h2>
<p><em>Fuente: &quot;Capabilities Photonic LAB&quot;, Mayo 2026. Doc #8. Corresponde al plano conceptual (infografía de bandas).</em></p>
<p>Plataforma transversal para proteínas recombinantes y bioproductos: procariotas (E. coli), levaduras (Pichia pastoris, S. cerevisiae), mamífero (CHO, HEK293), insecto (Sf9, Hi5), hongos filamentosos (Aspergillus, Trichoderma), microalgas. Cubre salud humana, animal, alimentos y agro sin variación sustancial de infraestructura.</p>
<h3 id=&quot;las-21-zonas-por-banda&quot;>Las 21 zonas por banda</h3>
<p><strong>Banda 1 — Logística/almacenes (flujo entrada unidireccional):</strong>
1. Depósito materias primas · 2. Recepción/descarga · 3. Depósito insumos consumibles SU · 4. Depósito materiales limpios · 5. Expedición.</p>
<p><strong>Banda 2 — Preparación:</strong>
6. Pesadas/muestreo · 7. Preparación medios/soluciones · 8. Acondicionamiento de materiales · 9. Lavadero.</p>
<p><strong>Banda 3 — Producción (corredor ISO 8):</strong>
10. Banco celular · 11. Inóculo (seed train) · 12. Fermentación/cultivo celular · 13. Purificación/downstream (3 salas: Puri 1, Puri 2, Filtración Final).</p>
<p><strong>Banda 4 — Innovación y Desarrollo + QA/QC (circulación CNC):</strong>
14. Innovación y Desarrollo (terapia génica, CAR-T, suite analítica standalone) · 15. QA/QC (físico-química/inmunoquímica, microbiología, genómica).</p>
<p><strong>Banda 5 — Soporte/servicios:</strong>
Esclusa residuos · Depósito residuos · Vestuarios · Sala reuniones/onboarding · IT/Servers.</p>

<p><strong>Analítica (QA/QC + I+D):</strong> HPLC/UPLC UV/DAD · qPCR (Bio-Rad CFX Opus / Thermo QuantStudio) · NanoDrop Ultra · UV-Vis (Agilent Cary 60) · electroforesis (Bio-Rad Mini-PROTEAN + Trans-Blot) · lector ELISA (BioTek).</p>

    <p class=&quot;subtitle&quot;>Una vista de primer nivel de Photonic Labs: qué ES (tesis A/A+/B), con quién se relaciona (ecosistema), cómo fluye la materia (planta), cómo fluye el capital (valor), y cómo se ejecuta (A→D · MVP·V1·V2). Sincronizado al canon de julio 2026.</p>
    <div class=&quot;meta-grid&quot;>
      <span><b>Owner</b> René · gate Gastón</span>
      <span><b>Modelo</b> 3 (I+D + GMP-Ready)</span>
      <span><b>Sitio</b> Parque de las Ciencias, Canelones</span>

  <!-- 01 · TESIS -->
  <section>
    <div class=&quot;sec-head&quot;><span class=&quot;sec-num&quot;>01</span><span class=&quot;sec-title&quot;>La pregunta de tesis — <b>qué ES Photonic</b></span></div>
    <p class=&quot;sec-sub&quot;>No es &quot;cuánto se levanta&quot; sino &quot;qué es&quot;. Tres caminos vivos — dos variantes del wet-lab de servicios (A y A+) y un vehículo lab+fondo (B). Negocios distintos, con rondas, inversores y riesgos distintos. Gate: Gastón.</p>
    <div class=&quot;tri&quot;>
      <div class=&quot;col&quot;>
        <div class=&quot;col-h&quot;><div class=&quot;tag&quot;>Camino A · piso de caja</div><div class=&quot;nm&quot;>Wet-lab lean</div><div class=&quot;one&quot;>Modelo 3, TRL 5–8. Sin capa de cómputo.</div></div>
        <dl>
          <dt>Lente</dt><dd>Caja. Runway, break-even, márgenes.</dd>
          <dt>Capex / ronda</dt><dd><b>$1.48M</b> · $1.9M (NoZF) / $2.05M (ZF)</dd>
          <dt>Retorno</dt><dd>EBITDA+ Y2 · neto 6a ~$3.33M</dd>
          <dt>Riesgo</dt><dd><b>Commodity</b> — fee-for-service replicable</dd>
        </dl>
      </div>
      <div class=&quot;col aplus&quot;>
        <div class=&quot;col-h&quot;><div class=&quot;tag&quot;>Camino A+ · decisión 07-02</div><div class=&quot;nm&quot;>Wet-lab + cómputo</div><div class=&quot;one&quot;>La base + capa in-silico / digital-twin / custodia de IP como <b>booster</b>.</div><span class=&quot;badge-base&quot;>Caso base · piso realista</span></div>
        <dl>
          <dt>Lente</dt><dd>Caja + <b>foso</b>.</dd>
          <dt>Capex / ronda</dt><dd>~$1.5M · <b>~$2M</b> · sin salto de ticket</dd>
          <dt>Retorno</dt><dd>Capa ~85% margen · <b>sostiene el EBITDA Y2</b></dd>
          <dt>Exige</dt><dd>Capa como <b>booster</b>, no core soberano</dd>
        </dl>
      </div>
      <div class=&quot;col b&quot;>
        <div class=&quot;col-h&quot;><div class=&quot;tag&quot;>Camino B · gate Gastón</div><div class=&quot;nm&quot;>Lab + fondo (flywheel)</div><div class=&quot;one&quot;>Modelo SOSV/IndieBio: invertir + alojar + componer.</div></div>
        <dl>
          <dt>Lente</dt><dd>Patrimonial. Retorno del equity del portfolio.</dd>
          <dt>Capex / ronda</dt><dd>vehículo <b>$15–20M</b> (o lean $10M) <i>(est.)</i></dd>
          <dt>Fondea</dt><dd>Soberano/estratégico + LPs. <b>Hoy no comprometido.</b></dd>
          <dt>Riesgo</dt><dd>Revenue circular · conflicto de interés · overlap <b>Panambi</b></dd>
        </dl>
      </div>
    </div>
    <div class=&quot;strike&quot;><b>Descartado (07-07):</b> la dirección <span class=&quot;x&quot;>landmark / edificio-statement (tipo Bodega Garzón)</span> — capex-heavy, la peor sustentada, compite con el capital desplegable; ni SOSV construyó landmark. Es statement, no plan.</div>
    <div class=&quot;note grn&quot;><b>El hallazgo del break-even:</b> sin la capa computacional, el EBITDA Y2 (NoZF) pasa de +$96k a ≈−$57k y el break-even se corre de Y2 a Y3. Por eso <b>A+ —no A puro— es el piso realista</b>: misma ronda (~$2M), mismo inversor, con el layer adentro como booster.</div>
    <div class=&quot;orth&quot;>🧭 <span><b>El eje Zona Franca es ORTOGONAL:</b> aplica igual a los tres caminos y se decide en paralelo (Fase A). No cambia cuál elegís — solo los parámetros fiscales. Estado: <b>reabierto</b> (all-in-ZF vs outside-first → dual-entity Yr 3–4).</span></div>
  </section>

(function(){
  var tabs=document.querySelectorAll('.tab');
  var frames={wiki:document.getElementById('f-wiki'),biblia:document.getElementById('f-biblia'),mapa:document.getElementById('f-mapa')};
  function go(key){
    if(!frames[key])return;
    tabs.forEach(function(t){t.classList.toggle('active',t.dataset.key===key);});
    Object.keys(frames).forEach(function(k){frames[k].classList.toggle('active',k===key);});

  }
  window.__go=go;
  tabs.forEach(function(t){t.addEventListener('click',function(){go(t.dataset.key);});});
  var h=(location.hash||'').replace('#','');
  if(frames[h])go(h);
})();
